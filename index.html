<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#0d131c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d131c; --card:#141c28; --card-hi:#1a2432;
    --line:rgba(255,255,255,0.08); --line-strong:rgba(255,255,255,0.15);
    --text:#e7ebf1; --text-dim:#8993a3;
    --blue:#5b9bd8; --sky:#6fb3c9; --amber:#e8a33d; --green:#4fc78a; --violet:#c77dd2; --red:#e8686f;
    --shadow:0 1px 2px rgba(0,0,0,0.2), 0 4px 16px rgba(0,0,0,0.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;
    min-height:100vh;-webkit-font-smoothing:antialiased;}
  .num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 40px;}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;}

  header{padding:26px 0 16px;position:relative;}
  header::before{content:"";position:absolute;top:-40px;left:-10%;width:75%;height:200px;
    background:radial-gradient(ellipse at top left, rgba(91,155,216,0.20), transparent 65%);
    pointer-events:none;z-index:0;}
  header > *{position:relative;z-index:1;}
  .hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .dot.stale{background:var(--amber);} .dot.dead{background:var(--red);}
  .dot.live{animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(79,199,138,.5);}
                   50%{opacity:.5;box-shadow:0 0 0 6px rgba(79,199,138,0);}}
  .stamp{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--text-dim);}
  .today-date{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--text-dim);}
  h1{font-size:23px;font-weight:700;margin:0;letter-spacing:-.01em;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow);margin-bottom:12px;}
  .lab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.11em;
    text-transform:uppercase;color:var(--text-dim);}

  /* today */
  .today{padding:18px;border-top:3px solid var(--blue);}
  .today.rest{border-top-color:#3a4a5c;}
  .today.done{border-top-color:var(--green);}
  .today .lab{margin-bottom:9px;display:flex;align-items:center;gap:7px;}
  .today h2{font-size:21px;font-weight:700;margin:0 0 8px;letter-spacing:-.01em;line-height:1.25;}
  .today .desc{font-size:13.5px;color:var(--text-dim);line-height:1.55;margin:0;
    white-space:pre-wrap;word-break:break-word;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .chip{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 9px;border-radius:14px;
    border:1px solid var(--line);background:var(--card-hi);color:var(--text-dim);}
  .chip.on{border-color:rgba(79,199,138,.45);color:var(--green);}

  /* countdown */
  .cd{padding:14px 18px;display:flex;align-items:center;gap:14px;border-top:3px solid var(--amber);}
  .cd .n{font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;
    color:var(--amber);line-height:1;}
  .cd .who{min-width:0;}
  .cd .who .t{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cd .who .d{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:2px;}

  /* form */
  .form-card{padding:16px 18px 14px;}
  .form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0 4px;}
  .fm{text-align:left;}
  .fm .k{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.07em;
    text-transform:uppercase;color:var(--text-dim);margin-bottom:3px;}
  .fm .v{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;line-height:1;}
  .fm .s{font-size:10.5px;color:var(--text-dim);margin-top:4px;}
  .spark{width:100%;height:38px;display:block;margin-top:10px;overflow:visible;}
  .spark polyline{fill:none;stroke:var(--blue);stroke-width:1.8;stroke-linejoin:round;stroke-linecap:round;}
  .spark .fill{stroke:none;fill:var(--blue);opacity:.13;}

  /* week strip */
  .week-card{padding:16px 18px 14px;}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;align-items:end;height:52px;margin-top:12px;}
  .wb{background:var(--card-hi);border-radius:3px 3px 0 0;min-height:3px;position:relative;}
  .wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:6px;}
  .wdays span{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-dim);text-align:center;}
  .wdays span.today{color:var(--amber);font-weight:600;}

  /* ftp footer */
  .ftp{padding:13px 18px;display:flex;flex-wrap:wrap;gap:6px 22px;align-items:baseline;}
  .ftp .item{display:flex;align-items:baseline;gap:6px;}
  .ftp .k{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.07em;
    text-transform:uppercase;color:var(--text-dim);}
  .ftp .v{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--text);}
  .ftp .v.amber{color:var(--amber);}

  .msg{padding:26px 18px;text-align:center;color:var(--text-dim);font-size:13.5px;line-height:1.6;}
  .msg code{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--sky);}
  footer{margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:10px;
    color:var(--text-dim);text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hdr-top">
      <span class="dot live" id="dot"></span>
      <span class="stamp" id="stamp">loading…</span>
      <span class="today-date" id="today-date"></span>
    </div>
    <h1 id="title">Training</h1>
  </header>
  <div id="app"><div class="card"><div class="msg">Reading <code>data.json</code>…</div></div></div>
  <footer id="foot"></footer>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const hm = s => !s ? null : Math.floor(s/3600) + 'h' + String(Math.round(s%3600/60)).padStart(2,'0');

function formVerdict(tsb){
  if (tsb >  15) return ['fresh, maybe too fresh', 'var(--sky)'];
  if (tsb >   5) return ['fresh', 'var(--green)'];
  if (tsb >  -8) return ['neutral', 'var(--text)'];
  if (tsb > -25) return ['building', 'var(--amber)'];
  return ['deep in it', 'var(--red)'];
}

function sparkline(vals){
  if (!vals || vals.length < 3) return '';
  const w = 480, h = 38;
  const max = Math.max(...vals), min = Math.min(...vals), span = (max - min) || 1;
  const pts = vals.map((v,i) => [
    (i * w / (vals.length - 1)).toFixed(1),
    (h - 3 - ((v - min) / span) * (h - 8)).toFixed(1)
  ]);
  const line = pts.map(p => p.join(',')).join(' ');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
      <polyline class="fill" points="0,${h} ${line} ${w},${h}"/>
      <polyline points="${line}"/></svg>`;
}

function renderToday(d){
  const p = (d.today.planned || [])[0];
  const done = d.today.completed || [];
  const doneLoad = done.reduce((x,a) => x + (a.load || 0), 0);

  let cls = 'today', lab = 'Today', body;
  if (p) {
    const chips = [];
    if (p.duration_s) chips.push(hm(p.duration_s));
    if (p.load) chips.push(p.load + ' TSS');
    done.forEach(a => chips.push(`<span class="chip on">done · ${esc(hm(a.duration_s) || '')}</span>`));
    body = `<h2>${esc(p.name)}</h2>` +
      (p.description ? `<p class="desc">${esc(p.description)}</p>` : '') +
      `<div class="chips">` +
        chips.map(c => c.startsWith('<') ? c : `<span class="chip">${esc(c)}</span>`).join('') +
      `</div>`;
    if (done.length) cls += ' done';
  } else if (done.length) {
    cls += ' done';
    body = `<h2>${esc(done[0].name)}</h2>
      <p class="desc">Nothing was scheduled — this one was yours.</p>
      <div class="chips"><span class="chip on">${esc(hm(done[0].duration_s) || '')}</span>` +
      (doneLoad ? `<span class="chip">${doneLoad} TSS</span>` : '') + `</div>`;
  } else {
    cls += ' rest';
    body = `<h2>Rest day</h2><p class="desc">Nothing on the calendar. Stay off the legs.</p>`;
  }
  return `<div class="card ${cls}"><div class="lab">${lab}</div>${body}</div>`;
}

function renderCountdown(b){
  if (!b) return '';
  const when = new Date(b.date + 'T00:00:00')
    .toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric'});
  const n = b.days <= 0 ? 'today' : b.days;
  return `<div class="card cd">
      <span class="n">${esc(n)}</span>
      <div class="who">
        <div class="t">${esc(b.name)}</div>
        <div class="d">${esc(when)}${b.days > 0 ? ' · days away' : ''}</div>
      </div></div>`;
}

function renderForm(f){
  if (!f || (!f.ctl && !f.atl)) return '';
  const [verdict, col] = formVerdict(f.tsb);
  return `<div class="card form-card">
      <div class="lab">Form</div>
      <div class="form-row">
        <div class="fm"><div class="k">Fitness</div><div class="v">${f.ctl}</div><div class="s">CTL</div></div>
        <div class="fm"><div class="k">Fatigue</div><div class="v">${f.atl}</div><div class="s">ATL</div></div>
        <div class="fm"><div class="k">Form</div>
          <div class="v" style="color:${col}">${f.tsb > 0 ? '+' : ''}${f.tsb}</div>
          <div class="s">${esc(verdict)}</div></div>
      </div>
      ${sparkline(f.ctl_series)}
      <div class="s" style="font-size:10px;color:var(--text-dim);margin-top:2px;">Fitness, last 90 days</div>
    </div>`;
}

function renderWeek(week){
  if (!week || !week.length) return '';
  const max = Math.max(...week.map(w => w.actual), 1);
  const todayISO = new Date().toISOString().slice(0,10);
  const bars = week.map(w => {
    const h = w.actual ? Math.max(3, Math.round(w.actual / max * 52)) : 3;
    const col = w.actual ? 'var(--blue)' : 'var(--card-hi)';
    return `<div class="wb" style="height:${h}px;background:${col}"
              title="${esc(w.date)} · ${w.actual} TSS"></div>`;
  }).join('');
  const labels = week.map(w => {
    const d = new Date(w.date + 'T00:00:00');
    return `<span class="${w.date === todayISO ? 'today' : ''}">${
      d.toLocaleDateString(undefined,{weekday:'narrow'})}</span>`;
  }).join('');
  const total = week.reduce((x,w) => x + w.actual, 0);
  return `<div class="card week-card">
      <div class="lab">Last 7 days · ${total} TSS</div>
      <div class="week">${bars}</div>
      <div class="wdays">${labels}</div>
    </div>`;
}

function renderFtp(a){
  const bits = [];
  if (a.ftp)      bits.push(`<div class="item"><span class="k">FTP</span><span class="v amber">${a.ftp} W</span></div>`);
  if (a.eftp)     bits.push(`<div class="item"><span class="k">eFTP</span><span class="v">${a.eftp} W</span></div>`);
  if (a.wkg)      bits.push(`<div class="item"><span class="k">W/kg</span><span class="v">${a.wkg}</span></div>`);
  if (a.weight_kg)bits.push(`<div class="item"><span class="k">Weight</span><span class="v">${a.weight_kg} kg</span></div>`);
  return bits.length ? `<div class="card ftp">${bits.join('')}</div>` : '';
}

function staleness(iso){
  const age = (Date.now() - new Date(iso)) / 3600000;
  const dot = $('dot');
  dot.className = 'dot' + (age < 6 ? ' live' : age < 36 ? ' stale' : ' dead');
  const rel = age < 1 ? Math.round(age*60) + ' min ago'
            : age < 36 ? Math.round(age) + ' h ago'
            : Math.round(age/24) + ' days ago';
  $('stamp').textContent = 'updated ' + rel;
  return age;
}

async function load(){
  let d;
  try {
    const r = await fetch('data.json?t=' + Date.now(), {cache:'no-store'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    d = await r.json();
  } catch (err) {
    $('dot').className = 'dot dead';
    $('stamp').textContent = 'no data';
    $('app').innerHTML = `<div class="card"><div class="msg">
        Couldn't read <code>data.json</code>.<br>
        Check that the fetch script has run and written it next to this page.
      </div></div>`;
    return;
  }

  const age = staleness(d.generated);
  $('title').textContent = d.athlete?.name ? d.athlete.name.split(' ')[0] + "'s training"
                                           : 'Training';
  $('today-date').textContent = new Date().toLocaleDateString(undefined,
    {weekday:'long', month:'short', day:'numeric'});

  $('app').innerHTML =
      renderToday(d)
    + renderCountdown(d.next_benchmark)
    + renderForm(d.form)
    + renderWeek(d.week)
    + renderFtp(d.athlete || {});

  $('foot').textContent = age > 36
    ? 'Data is stale — is the cron job still running?'
    : 'intervals.icu';
}

load();
// refresh when the page is brought back to the foreground
document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });
</script>
</body>
</html>
