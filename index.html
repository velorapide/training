<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#0d131c">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d131c; --card:#141c28; --card-hi:#1a2432;
    --line:rgba(255,255,255,0.08); --line-strong:rgba(255,255,255,0.15);
    --text:#e7ebf1; --text-dim:#8993a3;
    --blue:#5b9bd8; --sky:#6fb3c9; --amber:#e8a33d; --green:#4fc78a;
    --violet:#c77dd2; --red:#e8686f; --slate:#5a6675;
    --shadow:0 1px 2px rgba(0,0,0,.2), 0 4px 16px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
  .wrap{max-width:1000px;margin:0 auto;padding:0 18px 70px;}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
  button{font:inherit;color:inherit;}

  header{padding:26px 0 14px;position:relative;}
  header::before{content:"";position:absolute;top:-40px;left:-10%;width:70%;height:210px;
    background:radial-gradient(ellipse at top left,rgba(91,155,216,.20),transparent 65%);z-index:0;}
  header::after{content:"";position:absolute;top:-20px;right:-5%;width:50%;height:180px;
    background:radial-gradient(ellipse at top right,rgba(232,163,61,.11),transparent 65%);z-index:0;}
  header>*{position:relative;z-index:1;}
  .hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .dot.stale{background:var(--amber);} .dot.dead{background:var(--red);}
  .dot.live{animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(79,199,138,.5);}
    50%{opacity:.5;box-shadow:0 0 0 6px rgba(79,199,138,0);}}
  .stamp{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--text-dim);}
  .today-date{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--text-dim);}
  h1{font-size:24px;font-weight:700;margin:0;letter-spacing:-.01em;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:11px;
    box-shadow:var(--shadow);margin-bottom:13px;padding:13px 16px;}
  .lab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.11em;
    text-transform:uppercase;color:var(--text-dim);}
  .ch-title{font-size:12.5px;font-weight:600;color:var(--text-dim);text-transform:uppercase;
    letter-spacing:.05em;margin-bottom:3px;}
  .ch-sub{font-size:11px;color:var(--text-dim);margin-bottom:14px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:800px){.grid2{grid-template-columns:1fr;}}

  /* top row: today + countdown share the width on desktop */
  

  /* today */
  .today{border-top:3px solid var(--blue);}
  .today.rest{border-top-color:var(--slate);}
  .today.done{border-top-color:var(--green);}
  .today h2{font-size:20px;font-weight:700;margin:4px 0 0;letter-spacing:-.01em;}
  .desc{font-size:13.5px;color:var(--text-dim);line-height:1.5;margin:0;white-space:pre-wrap;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .chip{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 9px;border-radius:14px;
    border:1px solid var(--line);background:var(--card-hi);color:var(--text-dim);}
  .chip.on{border-color:rgba(79,199,138,.45);color:var(--green);}
  .nextup{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
  .nextup .nx-name{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:5px;}

  /* countdown, stacked to fill its column */


  /* stat strip */
  .statwrap{margin-bottom:13px;}
  .statbar{display:flex;align-items:center;gap:12px;margin-bottom:9px;}
  .statbar .lab{color:var(--text-dim);}
  .statbar .seg{margin-left:auto;}
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
  @media(max-width:1000px){.stats{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:620px){.stats{grid-template-columns:repeat(2,1fr);}}
  .stat{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--line-strong);
    border-radius:11px;padding:9px 13px;box-shadow:var(--shadow);}
  .stat .k{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stat .v{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;margin-top:3px;
    white-space:nowrap;}
  .stat .v small{font-size:10px;color:var(--text-dim);font-weight:400;margin-left:3px;}
  .cdstat .v small{display:block;margin-left:0;margin-top:2px;}

  /* form */
  .form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0 6px;}
  .fm .k{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.07em;
    text-transform:uppercase;color:var(--text-dim);margin-bottom:3px;}
  .fm .v{font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;line-height:1;}
  .fm .s{font-size:10.5px;color:var(--text-dim);margin-top:4px;}
  .fhead{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:2px;}
  .fbadges{display:flex;flex-wrap:wrap;gap:7px;margin-left:auto;}
  .fbadge{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text);
    background:var(--card-hi);border:1px solid var(--line);border-radius:7px;padding:5px 9px;
    display:flex;align-items:baseline;gap:6px;}
  .fbadge em{font-style:normal;font-size:9px;letter-spacing:.07em;text-transform:uppercase;
    color:var(--text-dim);font-weight:400;}
  .rhead{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
  .rhead .seg{margin-left:auto;}
  .lmap{height:520px;border-radius:9px;overflow:hidden;background:#0b1017;}
  @media(max-width:700px){.lmap{height:380px;}}
  .rmap{width:100%;height:100%;display:block;}
  .leaflet-container{background:#0b1017;font-family:'Inter',sans-serif;}
  .leaflet-control-attribution{background:rgba(13,19,28,.75)!important;color:#8993a3!important;
    font-size:9.5px!important;}
  .leaflet-control-attribution a{color:#6fb3c9!important;}
  .leaflet-bar a{background:#141c28!important;color:#e7ebf1!important;
    border-color:rgba(255,255,255,.12)!important;}
  .leaflet-bar a:hover{background:#1a2432!important;}
  .leaflet-tooltip{background:#141c28!important;border:1px solid rgba(255,255,255,.15)!important;
    color:#e7ebf1!important;font-family:'IBM Plex Mono',monospace!important;font-size:11px!important;
    box-shadow:0 4px 16px rgba(0,0,0,.4)!important;}
  .leaflet-tooltip:before{border-top-color:rgba(255,255,255,.15)!important;}

  .dowgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;align-items:end;}
  .dowcol{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .dowbar{width:100%;background:var(--blue);border-radius:3px 3px 0 0;min-height:3px;}
  .dowlab{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:.04em;}
  .dowval{font-size:11px;color:var(--text);}

  .gearrow{display:grid;grid-template-columns:1fr 2fr auto;gap:12px;align-items:center;
    padding:9px 0;border-bottom:1px solid var(--line);}
  .gearrow:last-child{border-bottom:0;}
  .gname{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gname em{font-style:normal;font-size:10px;color:var(--text-dim);}
  .gbar{height:7px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;}
  .gbar i{display:block;height:100%;background:var(--blue);border-radius:4px;}
  .gval{font-size:12px;color:var(--text-dim);white-space:nowrap;}
  @media(max-width:600px){.gearrow{grid-template-columns:1fr auto;}.gbar{display:none;}}

  .chart-wrap{position:relative;height:190px;margin-top:8px;}
  .chart-wrap.tall{height:230px;}

  /* calendar */
  .cal-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
  .seg{display:flex;background:transparent;border:1px solid var(--line);border-radius:7px;
    padding:2px;margin-left:auto;}
  .seg button{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.03em;
    text-transform:uppercase;background:none;border:none;color:var(--text-dim);
    padding:5px 11px;border-radius:5px;cursor:pointer;}
  .seg button.active{background:var(--card-hi);color:var(--text);font-weight:600;}
  .cal-bar{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
  .cal-nav{display:flex;gap:3px;}
  .cal-nav button{height:25px;min-width:25px;padding:0 8px;border-radius:6px;background:none;
    border:1px solid var(--line);color:var(--text-dim);cursor:pointer;line-height:1;
    font-family:'IBM Plex Mono',monospace;font-size:11px;}
  .cal-nav button:hover{background:var(--card-hi);color:var(--text);}
  .cal-label{font-size:12.5px;font-weight:600;color:var(--text);}

  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
  .cal-dow span{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-dim);
    text-align:center;text-transform:uppercase;letter-spacing:.06em;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cell{aspect-ratio:1;border-radius:6px;background:rgba(255,255,255,.025);border:1px solid transparent;
    padding:4px 5px;display:flex;flex-direction:column;gap:2px;min-width:0;position:relative;}
  .cell.out{opacity:.28;}
  .cell.today{border-color:var(--amber);}
  .cell .dnum{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--text-dim);line-height:1;}
  .cell.today .dnum{color:var(--amber);font-weight:600;}
  .cell .bars{margin-top:auto;display:flex;flex-direction:column;gap:2px;}
  .cell .bar{height:4px;border-radius:2px;}
  .cell .bar.a{background:var(--blue);}
  .cell .bar.p{background:rgba(232,163,61,.55);}
  .cell .ld{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text);line-height:1;}
  .cal-key{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;
    font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;
    letter-spacing:.04em;color:var(--text-dim);}
  .cal-key span{display:flex;align-items:center;gap:6px;}
  .cal-key i{width:10px;height:10px;border-radius:2px;}

  /* day view */
  .daytot{display:flex;gap:20px;font-size:12.5px;color:var(--text-dim);
    padding-bottom:11px;border-bottom:1px solid var(--line);}
  .daytot b{color:var(--text);font-size:15px;}
  .dayrow{display:flex;align-items:baseline;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);}
  .dayrow .nm{font-size:14px;font-weight:500;}
  .dayrow .meta{margin-left:auto;font-size:11.5px;color:var(--text-dim);text-align:right;}

  /* week view */
  .wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .wcol{background:rgba(255,255,255,.025);border:1px solid transparent;border-radius:8px;
    padding:8px 7px;min-width:0;display:flex;flex-direction:column;gap:6px;}
  .wcol.today{border-color:var(--amber);}
  .wday{font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--text-dim);line-height:1.3;}
  .wday b{display:block;font-size:15px;color:var(--text);font-weight:600;}
  .wcol.today .wday b{color:var(--amber);}
  .wbar{background:var(--blue);border-radius:3px;min-height:3px;width:100%;}
  .witems{display:flex;flex-direction:column;gap:5px;}
  .witem{border-radius:5px;padding:5px 6px;font-size:11px;line-height:1.35;min-width:0;}
  .witem.done{background:rgba(91,155,216,.16);border-left:2px solid var(--blue);}
  .witem.plan{background:rgba(232,163,61,.10);border-left:2px solid rgba(232,163,61,.6);}
  .witem span{display:block;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .witem em{display:block;font-style:normal;font-size:9.5px;color:var(--text-dim);margin-top:2px;}
  .wempty{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);opacity:.5;}
  .wtot{display:flex;flex-wrap:wrap;gap:8px 20px;margin-top:13px;padding-top:11px;
    border-top:1px solid var(--line);font-size:12px;color:var(--text-dim);}
  .wtot b{color:var(--text);font-size:14px;}
  .wtot .dim b{color:var(--text-dim);}
  @media(max-width:760px){
    .wgrid{grid-template-columns:1fr;gap:5px;}
    .wcol{flex-direction:row;align-items:center;gap:10px;}
    .wday{width:52px;flex-shrink:0;}
    .wday b{display:inline;margin-left:5px;}
    .wbar{display:none;}
    .witems{flex:1;min-width:0;}
  }

  /* year heatmap */
  .yscroll{overflow-x:auto;padding-bottom:4px;}
  .ywrap{min-width:740px;}
  .ymons{display:flex;gap:3px;margin-bottom:4px;}
  .ymon{width:12px;flex:1 0 12px;font-family:'IBM Plex Mono',monospace;font-size:9px;
    color:var(--text-dim);white-space:nowrap;}
  .ygrid{display:flex;gap:3px;}
  .ycol{display:flex;flex-direction:column;gap:3px;flex:1 0 12px;}
  .ycell{aspect-ratio:1;border-radius:2px;border:1px solid transparent;}
  .ycell.today{border-color:var(--amber);}

  /* zones */
  .tz-bar{display:flex;height:28px;border-radius:5px;overflow:hidden;background:rgba(255,255,255,.04);margin-top:10px;}
  .tz-seg{display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;color:rgba(13,19,28,.85);font-weight:600;min-width:0;}
  .tz-key{display:flex;flex-wrap:wrap;gap:7px 15px;margin-top:12px;
    font-family:'IBM Plex Mono',monospace;font-size:10px;
    letter-spacing:.04em;color:var(--text-dim);}
  .tz-key b{color:var(--text);font-weight:600;}
  .tz-key span{display:flex;align-items:center;gap:6px;}
  .tz-key i{width:10px;height:10px;border-radius:2px;}

  /* table */
  .tbl-head,.row{display:grid;grid-template-columns:64px 1.5fr 64px 64px 58px 58px 52px;
    gap:10px;align-items:center;}
  .tbl-head{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.07em;
    text-transform:uppercase;color:var(--text-dim);padding:0 2px 9px;border-bottom:1px solid var(--line);}
  .row{padding:10px 2px;border-bottom:1px solid var(--line);cursor:pointer;
    background:none;border-left:0;border-right:0;border-top:0;width:100%;text-align:left;}
  .row:hover{background:rgba(255,255,255,.03);}
  .row:last-child{border-bottom:0;}
  .row .when{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);}
  .row .nm{display:flex;align-items:center;gap:8px;min-width:0;}
  .row .nm .pip{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .row .nm span{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .n{font-family:'IBM Plex Mono',monospace;font-size:12.5px;text-align:right;}
  .row .n.dim{color:var(--text-dim);}
  .rt{text-align:right;}
  @media(max-width:700px){
    .tbl-head{display:none;}
    .row{grid-template-columns:52px 1fr 52px;}
    .row .hide{display:none;}
  }

  .msg{padding:30px 4px;text-align:center;color:var(--text-dim);font-size:13.5px;line-height:1.6;}
  .msg code{font-family:'IBM Plex Mono',monospace;color:var(--sky);}
  footer{margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:10px;
    color:var(--text-dim);text-align:center;}

  /* modal */
  .backdrop{position:fixed;inset:0;background:rgba(5,8,12,.65);backdrop-filter:blur(2px);
    display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .backdrop.open{display:flex;}
  @media(min-width:640px){.backdrop{align-items:center;}}
  .modal{background:var(--card);border:1px solid var(--line-strong);border-radius:14px 14px 0 0;
    width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:22px 20px 26px;position:relative;}
  @media(min-width:640px){.modal{border-radius:14px;}}
  .modal h2{font-size:19px;margin:0 0 2px;padding-right:34px;}
  .modal .mdate{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);margin-bottom:15px;}
  .mclose{position:absolute;top:13px;right:13px;background:var(--card-hi);border:1px solid var(--line-strong);
    color:var(--text-dim);width:29px;height:29px;border-radius:50%;cursor:pointer;}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .mgrid div{background:var(--card-hi);border:1px solid var(--line);border-radius:8px;padding:9px 11px;}
  .mgrid .k{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--text-dim);margin-bottom:3px;}
  .mgrid .v{font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hdr-top">
      <span class="dot live" id="dot"></span>
      <span class="stamp" id="stamp">loading…</span>
      <span class="today-date" id="today-date"></span>
    </div>
    <h1 id="title">Training</h1>
  </header>
  <div id="app"><div class="card"><div class="msg">Reading <code>data.json</code>…</div></div></div>
  <footer id="foot"></footer>
</div>

<div class="backdrop" id="backdrop">
  <div class="modal"><button class="mclose" id="mclose" aria-label="Close">✕</button>
    <div id="mbody"></div></div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const hm = s => !s ? null : Math.floor(s/3600) + 'h' + String(Math.round(s%3600/60)).padStart(2,'0');
const mi = m => m ? (m/1609.34) : 0;
const lb = kg => (kg==null||kg==='') ? null : +(kg*2.20462).toFixed(1);
const ft = m => m ? (m*3.28084) : 0;
const ZC = ['#5a6675','#5b9bd8','#4fc78a','#e8a33d','#e8686f','#c77dd2','#8b5cf6'];
const SPORT = {Ride:'#5b9bd8', VirtualRide:'#6fb3c9', MountainBikeRide:'#4fc78a',
               Run:'#e8a33d', Walk:'#c77dd2', Hike:'#c77dd2', Swim:'#6fb3c9'};
const sportCol = t => SPORT[t] || '#5b9bd8';
let D = null, calAnchor = null, calView = 'week';

const CHART_BASE = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{labels:{color:'#8993a3',font:{family:'Inter',size:11},
    boxWidth:12,usePointStyle:true}}},
  scales:{
    x:{grid:{display:false},border:{display:false},
       ticks:{color:'#8993a3',font:{family:'IBM Plex Mono',size:9.5},maxRotation:0,autoSkipPadding:14}},
    y:{grid:{color:'rgba(255,255,255,.06)'},border:{display:false},
       ticks:{color:'#8993a3',font:{family:'IBM Plex Mono',size:9.5}}}
  }
};
const merge = o => JSON.parse(JSON.stringify(CHART_BASE)) && Object.assign(
  JSON.parse(JSON.stringify(CHART_BASE)), o);

function whenLabel(iso){
  const d = new Date(iso+'T00:00:00');
  const days = Math.round((d - new Date(new Date().toDateString()))/86400000);
  if(days===0) return 'today';
  if(days===1) return 'tomorrow';
  return d.toLocaleDateString(undefined,{weekday:'long'}) + ' · ' + days + ' days';
}
function formVerdict(t){
  if(t>15) return ['fresh, maybe too fresh','var(--sky)'];
  if(t>5)  return ['fresh','var(--green)'];
  if(t>-8) return ['neutral','var(--text)'];
  if(t>-25)return ['building','var(--amber)'];
  return ['deep in it','var(--red)'];
}

const PERIODS=[['day','Day'],['week','Week'],['month','Month'],['year','Year'],['all','All']];
let period='week';

function periodStart(){
  const t=new Date(D.today.date+'T00:00:00');
  if(period==='day')   return t;
  if(period==='week')  return mondayOf(t);
  if(period==='month') return new Date(t.getFullYear(),t.getMonth(),1);
  if(period==='year')  return new Date(t.getFullYear(),0,1);
  return new Date((D.earliest||'2000-01-01')+'T00:00:00');
}

function periodTotals(){
  const from=iso(periodStart()), to=D.today.date, d=D.daily||{};
  let n=0,s=0,m=0,e=0,l=0;
  for(const k in d){
    if(k<from||k>to) continue;
    const b=d[k]; n+=b.n||0; s+=b.s||0; m+=b.m||0; e+=b.e||0; l+=b.l||0;
  }
  return {n,s,m,e,l,from};
}

function periodLabel(){
  const t=periodTotals();
  if(period==='all') return 'since '+new Date(t.from+'T00:00:00')
    .toLocaleDateString(undefined,{month:'short',year:'numeric'});
  if(period==='day') return 'today';
  if(period==='week') return 'this week';
  if(period==='month') return new Date(D.today.date+'T00:00:00')
    .toLocaleDateString(undefined,{month:'long'});
  return new Date(D.today.date+'T00:00:00').getFullYear();
}

/* ---- shared helpers ---- */
const iso = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const mondayOf = d => { const x=new Date(d); x.setDate(x.getDate()-((x.getDay()+6)%7)); x.setHours(0,0,0,0); return x; };
const dayData = i => (D.calendar||{})[i];
const dayLoad = i => {
  const c=(D.calendar||{})[i];
  if(c && (c.al||c.pl!==undefined)) return c.al||0;
  const dl=(D.daily||{})[i];
  return dl? dl.l : 0;
};

function loadColour(load, max){
  if(!load) return 'rgba(255,255,255,.04)';
  const t=Math.min(1, load/(max||100));
  return `rgba(91,155,216,${(0.18+0.72*t).toFixed(2)})`;
}

/* ---- the four views ---- */

function viewDay(){
  const i=iso(calAnchor), c=dayData(i);
  const planned=(c&&c.p)||[], actual=(c&&c.a)||[];
  const block=(arr,title,col)=> arr.length? `
    <div class="lab" style="margin:16px 0 8px;color:${col}">${title}</div>` +
    arr.map(x=>`<div class="dayrow">
      <span class="nm">${esc(x.name)}</span>
      <span class="num meta">${[hm(x.secs), x.load?x.load+' TSS':null,
        x.meters?mi(x.meters).toFixed(1)+' mi':null].filter(Boolean).join(' · ')||'—'}</span>
    </div>`).join('') : '';
  if(!planned.length && !actual.length)
    return `<div class="msg">Nothing planned or recorded on this day.</div>`;
  return `<div class="daytot">
      <span><b class="num">${Math.round((c&&c.al)||0)}</b> TSS completed</span>
      ${c&&c.pl?`<span><b class="num">${Math.round(c.pl)}</b> TSS planned</span>`:''}
    </div>` + block(actual,'Completed','var(--green)') + block(planned,'Planned','var(--amber)');
}

function viewWeek(){
  const start=mondayOf(calAnchor);
  const days=[...Array(7)].map((_,k)=>{ const d=new Date(start); d.setDate(start.getDate()+k); return d; });
  const loads=days.map(d=>{const c=dayData(iso(d));return Math.max((c&&c.al)||0,(c&&c.pl)||0);});
  const max=Math.max(...loads,60);
  let totA=0, totP=0, totS=0;
  const cols=days.map(d=>{
    const i=iso(d), c=dayData(i);
    const a=(c&&c.a)||[], p=(c&&c.p)||[];
    totA+=(c&&c.al)||0; totP+=(c&&c.pl)||0;
    a.forEach(x=>totS+=x.secs||0);
    const isToday=i===D.today.date;
    return `<div class="wcol${isToday?' today':''}" data-d="${i}">
      <div class="wday">${d.toLocaleDateString(undefined,{weekday:'short'})}
        <b>${d.getDate()}</b></div>
      <div class="wbar" style="height:${Math.round(Math.max((c&&c.al)||0,0)/max*46)}px"></div>
      <div class="witems">
        ${a.map(x=>`<div class="witem done"><span>${esc(x.name)}</span>
           <em class="num">${[hm(x.secs),x.load?x.load+' TSS':null].filter(Boolean).join(' · ')}</em></div>`).join('')}
        ${p.filter(()=>!a.length).map(x=>`<div class="witem plan"><span>${esc(x.name)}</span>
           <em class="num">${[hm(x.secs),x.load?x.load+' TSS':null].filter(Boolean).join(' · ')}</em></div>`).join('')}
        ${!a.length&&!p.length?`<div class="wempty">—</div>`:''}
      </div></div>`;
  }).join('');
  return `<div class="wgrid">${cols}</div>
    <div class="wtot">
      <span><b class="num">${Math.round(totA)}</b> TSS</span>
      <span><b class="num">${hm(totS)||'0h00'}</b></span>
      ${totP?`<span class="dim"><b class="num">${Math.round(totP)}</b> TSS planned</span>`:''}
    </div>`;
}

function viewMonth(){
  const first=new Date(calAnchor.getFullYear(), calAnchor.getMonth(), 1);
  const start=mondayOf(first);
  const cal=D.calendar||{};
  const max=Math.max(...Object.values(cal).flatMap(c=>[c.al||0,c.pl||0]),60);
  let cells='';
  for(let k=0;k<42;k++){
    const d=new Date(start); d.setDate(start.getDate()+k);
    const i=iso(d), c=cal[i];
    const out=d.getMonth()!==calAnchor.getMonth();
    let bars='';
    if(c){
      if(c.al) bars+=`<div class="bar a" style="width:${Math.max(12,Math.min(100,c.al/max*100))}%"></div>`;
      if(c.pl && !c.al) bars+=`<div class="bar p" style="width:${Math.max(12,Math.min(100,c.pl/max*100))}%"></div>`;
    }
    cells+=`<div class="cell${out?' out':''}${i===D.today.date?' today':''}" data-d="${i}">
      <div class="dnum">${d.getDate()}</div>
      ${c&&c.al?`<div class="ld">${Math.round(c.al)}</div>`:''}
      <div class="bars">${bars}</div></div>`;
  }
  return `<div class="cal-dow">${['M','T','W','T','F','S','S'].map(x=>`<span>${x}</span>`).join('')}</div>
    <div class="cal">${cells}</div>`;
}

function viewYear(){
  const y=calAnchor.getFullYear();
  const first=mondayOf(new Date(y,0,1));
  const last=new Date(y,11,31);
  const daily=D.daily||{};
  const vals=Object.keys(daily).filter(k=>k.startsWith(y)).map(k=>daily[k].l);
  const max=Math.max(...vals,60);
  let weeks='', months='', prevMonth=-1, wk=0, total=0, count=0, secs=0;
  const cur=new Date(first);
  while(cur<=last || cur.getDay()!==1){
    let col='';
    let labelled=false;
    for(let r=0;r<7;r++){
      const d=new Date(cur); d.setDate(cur.getDate()+r);
      const i=iso(d);
      const inYear=d.getFullYear()===y;
      const l=inYear?dayLoad(i):0;
      if(inYear && daily[i]){ total+=daily[i].l; count+=daily[i].n; secs+=daily[i].s; }
      if(r===0 && inYear && d.getMonth()!==prevMonth && d.getDate()<=7){
        prevMonth=d.getMonth(); labelled=true;
      }
      col+=`<div class="ycell${i===D.today.date?' today':''}" data-d="${i}"
        style="background:${inYear?loadColour(l,max):'transparent'}"
        title="${i}${l?' · '+l+' TSS':''}"></div>`;
    }
    months+=`<span class="ymon">${labelled?new Date(cur).toLocaleDateString(undefined,{month:'short'}):''}</span>`;
    weeks+=`<div class="ycol">${col}</div>`;
    cur.setDate(cur.getDate()+7); wk++;
    if(wk>54) break;
  }
  return `<div class="yscroll"><div class="ywrap">
      <div class="ymons">${months}</div>
      <div class="ygrid">${weeks}</div>
    </div></div>
    <div class="wtot">
      <span><b class="num">${count}</b> activities</span>
      <span><b class="num">${Math.round(secs/3600)}</b> h</span>
      <span><b class="num">${Math.round(total).toLocaleString()}</b> TSS</span>
    </div>
    <div class="cal-key"><span>Darker = bigger day</span><span>Tap a square for the detail</span></div>`;
}

function drawCalendar(){
  const body=$('cal-body'); if(!body) return;
  const L=$('cal-label');
  if(calView==='day'){
    body.innerHTML=viewDay();
    L.textContent=calAnchor.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  } else if(calView==='week'){
    body.innerHTML=viewWeek();
    const s=mondayOf(calAnchor), e=new Date(s); e.setDate(s.getDate()+6);
    L.textContent=s.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' – '+
                  e.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  } else if(calView==='month'){
    body.innerHTML=viewMonth();
    L.textContent=calAnchor.toLocaleDateString(undefined,{month:'long',year:'numeric'});
  } else {
    body.innerHTML=viewYear();
    L.textContent=calAnchor.getFullYear();
  }
  body.querySelectorAll('[data-d]').forEach(el=>{
    const i=el.dataset.d;
    if(calView==='year' || calView==='week'){
      el.style.cursor='pointer';
      el.addEventListener('click',()=>{ calAnchor=new Date(i+'T00:00:00'); calView='day';
        document.querySelectorAll('#cal-seg button').forEach(b=>
          b.classList.toggle('active', b.dataset.v==='day'));
        drawCalendar(); });
    } else if(dayData(i)){
      el.style.cursor='pointer';
      el.addEventListener('click',()=>openDay(i));
    }
  });
}

function calStep(dir){
  const d=new Date(calAnchor);
  if(calView==='day')   d.setDate(d.getDate()+dir);
  if(calView==='week')  d.setDate(d.getDate()+7*dir);
  if(calView==='month') d.setMonth(d.getMonth()+dir);
  if(calView==='year')  d.setFullYear(d.getFullYear()+dir);
  calAnchor=d; drawCalendar();
}

function secRoutes(){

/* Routes far from the usual roads (a trip, a race away) stretch the view and
   shrink everything else, so "Home" fits to the main cluster instead. */
function routeBounds(routes){
  let a=90,b=-90,c=180,d=-180;
  routes.forEach(r=>r.p.forEach(([la,lo])=>{
    if(la<a)a=la; if(la>b)b=la; if(lo<c)c=lo; if(lo>d)d=lo;}));
  return [[a,c],[b,d]];
}

function localRoutes(R){
  const mid=r=>r.p[Math.floor(r.p.length/2)];
  const las=R.map(r=>mid(r)[0]).sort((x,y)=>x-y);
  const los=R.map(r=>mid(r)[1]).sort((x,y)=>x-y);
  const mla=las[Math.floor(las.length/2)], mlo=los[Math.floor(los.length/2)];
  // keep rides whose midpoint sits within ~55 km of the median midpoint
  const near=R.filter(r=>{
    const [la,lo]=mid(r);
    return Math.abs(la-mla)<0.5 && Math.abs(lo-mlo)<0.5;
  });
  return near.length?near:R;
}

let mapObj=null, mapLayers=[], mapMode='local';

function drawMap(){
  const host=$('rmap'); if(!host) return;
  const R=(D.routes||[]).filter(r=>r.p&&r.p.length>1);
  if(!R.length) return;
  const shown = mapMode==='local' ? localRoutes(R) : R;
  const newest = R.reduce((a,b)=>a.d>b.d?a:b).d;

  if(typeof L === 'undefined'){ drawMapSVG(host, shown, newest); return; }

  if(!mapObj){
    mapObj = L.map(host, {
      zoomControl:true, attributionControl:true,
      scrollWheelZoom:false,          // so the page still scrolls over the map
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      attribution:'&copy; OpenStreetMap &copy; CARTO',
      subdomains:'abcd', maxZoom:19
    }).addTo(mapObj);
    mapObj.on('click',()=>mapObj.scrollWheelZoom.enable());
    mapObj.on('mouseout',()=>mapObj.scrollWheelZoom.disable());
  }
  mapLayers.forEach(l=>mapObj.removeLayer(l)); mapLayers=[];
  shown.forEach(r=>{
    const recent=r.d===newest;
    const line=L.polyline(r.p,{
      color: recent?'#e8a33d':'#5b9bd8',
      weight: recent?3:1.5,
      opacity: recent?0.95:0.38,
      smoothFactor:1.2
    }).addTo(mapObj);
    line.bindTooltip(new Date(r.d+'T00:00:00')
      .toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}));
    mapLayers.push(line);
  });
  mapObj.fitBounds(routeBounds(shown),{padding:[24,24]});
  setTimeout(()=>mapObj.invalidateSize(),120);
}

/* Used when the Leaflet CDN is unreachable - no tiles, but the shapes still read. */
function drawMapSVG(host, R, newest){
  let minLa=90,maxLa=-90,minLo=180,maxLo=-180;
  R.forEach(r=>r.p.forEach(([la,lo])=>{
    if(la<minLa)minLa=la; if(la>maxLa)maxLa=la;
    if(lo<minLo)minLo=lo; if(lo>maxLo)maxLo=lo;}));
  const midLa=(minLa+maxLa)/2, kx=Math.cos(midLa*Math.PI/180);
  const W=1000,H=560,pad=18;
  const sx=(maxLo-minLo)*kx||1e-6, sy=(maxLa-minLa)||1e-6;
  const scale=Math.min((W-pad*2)/sx,(H-pad*2)/sy);
  const ox=(W-sx*scale)/2, oy=(H-sy*scale)/2;
  const X=lo=>ox+(lo-minLo)*kx*scale, Y=la=>H-(oy+(la-minLa)*scale);
  host.innerHTML=`<svg class="rmap" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${
    R.map(r=>{
      const d=r.p.map(([la,lo],i)=>(i?'L':'M')+X(lo).toFixed(1)+' '+Y(la).toFixed(1)).join(' ');
      const rec=r.d===newest;
      return `<path d="${d}" fill="none" stroke="${rec?'#e8a33d':'#5b9bd8'}"
        stroke-width="${rec?2.2:1.1}" stroke-opacity="${rec?.95:.30}"
        stroke-linecap="round" stroke-linejoin="round"/>`;}).join('')}</svg>`;
}

/* ----------------------------------------------------------- power curve */

function secPower(){
  const pc=D.power_curve||{};
  if(!Object.values(pc).some(o=>o&&Object.keys(o).length)) return '';
  return `<div class="card"><div class="ch-title">Power curve</div>
    <div class="ch-sub">Best average power held for each duration</div>
    <div class="chart-wrap tall"><canvas id="c-power"></canvas></div>
    <p class="desc" style="margin-top:10px;">Derived from sampled power files, so treat
    these as close rather than exact — and only durations of a minute and up are meaningful.</p>
    </div>`;
}

/* --------------------------------------------------- year against year */

function cumulativeMiles(year){
  const d=D.daily||{}, out=new Array(366).fill(null);
  let run=0, seen=false;
  const start=new Date(year,0,1);
  const end=(year===new Date(D.today.date+'T00:00:00').getFullYear())
    ? new Date(D.today.date+'T00:00:00') : new Date(year,11,31);
  for(let k=0;k<366;k++){
    const dd=new Date(start); dd.setDate(start.getDate()+k);
    if(dd>end) break;
    const b=d[iso(dd)];
    if(b){ run+=(b.m||0)/1609.34; seen=true; }
    out[k]=run;
  }
  return seen?out:null;
}

function secYoY(){
  const y=new Date(D.today.date+'T00:00:00').getFullYear();
  if(!cumulativeMiles(y-1)) return '';
  return `<div class="card"><div class="ch-title">${y} against ${y-1}</div>
    <div class="ch-sub">Cumulative distance through the year</div>
    <div class="chart-wrap"><canvas id="c-yoy"></canvas></div></div>`;
}

/* ------------------------------------------------------ consistency */

function secStreaks(){
  const d=D.daily||{}, keys=Object.keys(d).sort();
  if(!keys.length) return '';
  const has=k=>!!d[k];
  // current streak, counting back from today (today itself not yet required)
  let cur=0, probe=new Date(D.today.date+'T00:00:00');
  if(!has(iso(probe))) probe.setDate(probe.getDate()-1);
  while(has(iso(probe))){ cur++; probe.setDate(probe.getDate()-1); }
  // longest streak across the record
  let best=0, run=0, prev=null;
  keys.forEach(k=>{
    if(prev){
      const gap=(new Date(k+'T00:00:00')-new Date(prev+'T00:00:00'))/86400000;
      run = gap===1 ? run+1 : 1;
    } else run=1;
    if(run>best) best=run;
    prev=k;
  });
  // days on per week, last 8 weeks
  const t=new Date(D.today.date+'T00:00:00');
  const wk=[]; let start=mondayOf(t);
  for(let w=7;w>=0;w--){
    const s=new Date(start); s.setDate(start.getDate()-7*w);
    let n=0;
    for(let k=0;k<7;k++){ const dd=new Date(s); dd.setDate(s.getDate()+k); if(has(iso(dd))) n++; }
    wk.push({label:s.toLocaleDateString(undefined,{month:'short',day:'numeric'}),n});
  }
  const avg=(wk.reduce((a,b)=>a+b.n,0)/wk.length).toFixed(1);
  // weekday fingerprint
  const dow=[0,0,0,0,0,0,0];
  keys.forEach(k=>{ dow[(new Date(k+'T00:00:00').getDay()+6)%7]++; });
  const dmax=Math.max(...dow,1);
  const names=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return `<div class="card"><div class="ch-title">Consistency</div>
    <div class="ch-sub">Streaks and the days you actually train</div>
    <div class="form-row" style="margin-bottom:14px;">
      <div class="fm"><div class="k">Current streak</div><div class="v">${cur}</div>
        <div class="s">${cur===1?'day':'days'}</div></div>
      <div class="fm"><div class="k">Longest</div><div class="v">${best}</div><div class="s">days</div></div>
      <div class="fm"><div class="k">Days on / week</div><div class="v">${avg}</div>
        <div class="s">last 8 weeks</div></div>
    </div>
    <div class="dowgrid">
      ${names.map((n,k)=>`<div class="dowcol">
        <div class="dowbar" style="height:${Math.max(3,Math.round(dow[k]/dmax*56))}px"></div>
        <div class="dowlab">${n}</div>
        <div class="dowval num">${dow[k]}</div></div>`).join('')}
    </div></div>`;
}

/* ------------------------------------------------------------- weather */

function secWeather(){
  const w=(D.weather||[]).filter(x=>x.temp!=null&&x.hr);
  if(w.length<5) return '';
  return `<div class="card"><div class="ch-title">Heat</div>
    <div class="ch-sub">Heart rate against temperature, ${w.length} rides</div>
    <div class="chart-wrap"><canvas id="c-weather"></canvas></div></div>`;
}

/* ---------------------------------------------------------------- gear */

function secGear(){
  const g=(D.gear||[]).filter(x=>x.meters);
  if(!g.length) return '';
  g.sort((a,b)=>b.meters-a.meters);
  const max=g[0].meters||1;
  return `<div class="card"><div class="ch-title">Gear</div>
    <div class="ch-sub">Distance logged per bike</div>
    ${g.map(x=>`<div class="gearrow">
      <span class="gname">${esc(x.name)}${x.retired?' <em>retired</em>':''}</span>
      <span class="gbar"><i style="width:${(x.meters/max*100).toFixed(0)}%"></i></span>
      <span class="gval num">${Math.round(mi(x.meters)).toLocaleString()} mi</span>
    </div>`).join('')}</div>`;
}

/* ------------------------------------------------------------------ charts */

function chart(id, cfg){
  // A blocked CDN or a bad dataset must never take the rest of the page with it.
  try{
    if(typeof Chart === 'undefined'){
      const el=$(id);
      if(el && el.parentElement) el.parentElement.innerHTML =
        `<div class="msg" style="padding:22px 4px;">Chart library didn't load.</div>`;
      return;
    }
    if($(id)) new Chart($(id), cfg);
  }catch(e){ console.error('chart '+id+' failed:', e); }
}

function charts(){
  const f=D.form;
  if(f && f.series && f.series.length>2 && $('c-form')){
    // project CTL/ATL forward across the planned sessions
    const plan={};
    (D.upcoming||[]).forEach(e=>{ plan[e.date]=(plan[e.date]||0)+(e.load||0); });
    const futureDates=Object.keys(plan).sort();
    const horizon=futureDates.length?futureDates[futureDates.length-1]:null;
    const proj=[];
    if(horizon){
      let ctl=f.ctl, atl=f.atl;
      let d=new Date(D.today.date+'T00:00:00');
      const end=new Date(horizon+'T00:00:00');
      while(d<=end){
        d.setDate(d.getDate()+1);
        const tss=plan[iso(d)]||0;
        ctl+=(tss-ctl)/42; atl+=(tss-atl)/7;
        proj.push({date:iso(d),ctl:+ctl.toFixed(1),atl:+atl.toFixed(1)});
      }
    }
    f._proj=proj;
    const hist=f.series, proj2=f._proj||[];
    const labels=hist.concat(proj2).map(x=>
      new Date(x.date+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'}));
    const pad=new Array(hist.length-1).fill(null);
    chart('c-form', {type:'line', data:{labels, datasets:[
        {label:'Fitness (CTL)',data:hist.map(x=>x.ctl),borderColor:'#5b9bd8',
         backgroundColor:'rgba(91,155,216,.13)',fill:true,tension:.3,pointRadius:0,borderWidth:2},
        {label:'Fatigue (ATL)',data:hist.map(x=>x.atl),borderColor:'#e8686f',
         fill:false,tension:.3,pointRadius:0,borderWidth:1.5,borderDash:[5,4]},
        ...(proj2.length?[{label:'Projected',
         data:pad.concat([hist[hist.length-1].ctl], proj2.map(x=>x.ctl)),
         borderColor:'#6fb3c9',fill:false,tension:.3,pointRadius:0,borderWidth:2,
         borderDash:[2,3]}]:[])
      ]}, options:merge({interaction:{mode:'index',intersect:false}})});
  }

  const w=D.weekly||[];
  if(w.length && $('c-week')){
    chart('c-week', {type:'bar', data:{
      labels:w.map(b=>new Date(b.week+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'})),
      datasets:[
        {label:'Completed',data:w.map(b=>b.actual),backgroundColor:'rgba(91,155,216,.65)',
         borderColor:'#5b9bd8',borderWidth:1,borderRadius:3},
        {label:'Planned',data:w.map(b=>b.planned),backgroundColor:'rgba(232,163,61,.30)',
         borderColor:'rgba(232,163,61,.7)',borderWidth:1,borderRadius:3}
      ]}, options:merge({})});
  }

  const m=D.monthly||[];
  if(m.length && $('c-month')){
    chart('c-month', {data:{
      labels:m.map(b=>b.month),
      datasets:[
        {type:'bar',label:'Hours',data:m.map(b=>b.hours),backgroundColor:'rgba(111,179,201,.55)',
         borderColor:'#6fb3c9',borderWidth:1,borderRadius:3,yAxisID:'y'},
        {type:'line',label:'Miles',data:m.map(b=>b.miles),borderColor:'#4fc78a',
         tension:.3,pointRadius:3,borderWidth:2,fill:false,yAxisID:'y1'}
      ]}, options:merge({scales:Object.assign({},CHART_BASE.scales,{
        y1:{position:'right',grid:{display:false},border:{display:false},
            ticks:{color:'#4fc78a',font:{family:'IBM Plex Mono',size:9.5}}}
      })})});
  }

  // power curve
  const pc=D.power_curve||{}, durs=(D.peak_durations||[60,300,600,1200,3600]);
  if($('c-power')){
    const fmt=d=>d>=3600?(d/3600)+'h':(d/60)+'m';
    const sets=[['42d','Last 6 weeks','#e8a33d'],['90d','Last 90 days','#5b9bd8'],
                ['all','All time','#4fc78a']]
      .filter(([k])=>pc[k]&&Object.keys(pc[k]).length)
      .map(([k,label,col])=>({label,data:durs.map(d=>pc[k][String(d)]??null),
        borderColor:col,backgroundColor:col+'22',tension:.35,pointRadius:3,
        borderWidth:k==='42d'?2.5:1.8,fill:false,spanGaps:true}));
    chart('c-power',{type:'line',data:{labels:durs.map(fmt),datasets:sets},
      options:merge({interaction:{mode:'index',intersect:false},
        scales:Object.assign({},CHART_BASE.scales,{
          y:{grid:{color:'rgba(255,255,255,.06)'},border:{display:false},
             ticks:{color:'#8993a3',font:{family:'IBM Plex Mono',size:9.5},callback:v=>v+'W'}}})})});
  }

  // this year against last
  if($('c-yoy')){
    const yr=new Date(D.today.date+'T00:00:00').getFullYear();
    const a=cumulativeMiles(yr), b=cumulativeMiles(yr-1);
    const labels=[...Array(366)].map((_,k)=>{
      const d=new Date(yr,0,1); d.setDate(d.getDate()+k);
      return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});});
    chart('c-yoy',{type:'line',data:{labels,datasets:[
      {label:String(yr),data:a,borderColor:'#5b9bd8',backgroundColor:'rgba(91,155,216,.13)',
       fill:true,tension:.2,pointRadius:0,borderWidth:2.2,spanGaps:true},
      {label:String(yr-1),data:b,borderColor:'#8993a3',fill:false,tension:.2,
       pointRadius:0,borderWidth:1.5,borderDash:[5,4],spanGaps:true}
    ]},options:merge({interaction:{mode:'index',intersect:false},
      scales:Object.assign({},CHART_BASE.scales,{
        y:{grid:{color:'rgba(255,255,255,.06)'},border:{display:false},
           ticks:{color:'#8993a3',font:{family:'IBM Plex Mono',size:9.5},
                  callback:v=>Math.round(v)+'mi'}}})})});
  }

  // heat: heart rate against temperature
  const wx=(D.weather||[]).filter(x=>x.temp!=null&&x.hr);
  if(wx.length>=5 && $('c-weather')){
    chart('c-weather',{type:'scatter',data:{datasets:[{label:'Rides',
      data:wx.map(x=>({x:x.temp*9/5+32,y:x.hr})),
      backgroundColor:'rgba(232,104,111,.6)',borderColor:'#e8686f',pointRadius:4}]},
      options:merge({plugins:{legend:{display:false}},scales:{
        x:{grid:{color:'rgba(255,255,255,.06)'},border:{display:false},
           title:{display:true,text:'°F',color:'#8993a3',font:{size:10}},
           ticks:{color:'#8993a3',font:{family:'IBM Plex Mono',size:9.5}}},
        y:{grid:{color:'rgba(255,255,255,.06)'},border:{display:false},
           ticks:{color:'#8993a3',font:{family:'IBM Plex Mono',size:9.5},callback:v=>v+' bpm'}}}})});
  }

  const wl=(D.wellness||[]).filter(x=>x.weight||x.rhr);
  if(wl.length>2 && $('c-well')){
    chart('c-well', {type:'line', data:{
      labels:wl.map(x=>new Date(x.date+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'})),
      datasets:[
        {label:'Weight (lb)',data:wl.map(x=>lb(x.weight)),borderColor:'#c77dd2',
         backgroundColor:'rgba(199,125,210,.12)',fill:true,tension:.3,pointRadius:0,borderWidth:2,
         spanGaps:true,yAxisID:'y'},
        {label:'Resting HR',data:wl.map(x=>x.rhr),borderColor:'#e8a33d',fill:false,
         tension:.3,pointRadius:0,borderWidth:1.5,spanGaps:true,yAxisID:'y1'}
      ]}, options:merge({interaction:{mode:'index',intersect:false},
        scales:Object.assign({},CHART_BASE.scales,{
          y1:{position:'right',grid:{display:false},border:{display:false},
              ticks:{color:'#e8a33d',font:{family:'IBM Plex Mono',size:9.5}}}
        })})});
  }
}

/* ------------------------------------------------------------------ modals */

function openModal(html){ $('mbody').innerHTML=html; $('backdrop').classList.add('open'); }
$('mclose').onclick=()=>$('backdrop').classList.remove('open');
$('backdrop').addEventListener('click',e=>{if(e.target.id==='backdrop')e.currentTarget.classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')$('backdrop').classList.remove('open');});

function openActivity(i){
  const a=(D.recent||[])[i]; if(!a) return;
  const cell=(k,v)=>v==null||v===''?'':`<div><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`;
  openModal(`<h2>${esc(a.name)}</h2>
    <div class="mdate">${new Date(a.date+'T00:00:00').toLocaleDateString(undefined,
      {weekday:'long',month:'long',day:'numeric'})}${a.start?' · '+esc(a.start):''}</div>
    <div class="mgrid">
      ${cell('Distance', a.meters?mi(a.meters).toFixed(1)+' mi':null)}
      ${cell('Moving time', hm(a.secs))}
      ${cell('Climbing', a.elev?Math.round(ft(a.elev)).toLocaleString()+' ft':null)}
      ${cell('Training load', a.load)}
      ${cell('Avg power', a.watts?a.watts+' W':null)}
      ${cell('Normalised', a.np?a.np+' W':null)}
      ${cell('Intensity', a.if)}
      ${cell('Avg / max HR', a.hr?a.hr+' / '+(a.max_hr||'—'):null)}
      ${cell('Cadence', a.cadence?a.cadence+' rpm':null)}
      ${cell('Decoupling', a.decoupling!=null?a.decoupling+' %':null)}
      ${cell('Efficiency', a.efficiency)}
      ${cell('Calories', a.cal)}
    </div>`);
}

function openDay(iso){
  const c=(D.calendar||{})[iso]; if(!c) return;
  const list=(arr,lab,col)=>arr.length?`<div class="lab" style="margin:14px 0 7px;color:${col}">${lab}</div>` +
    arr.map(x=>`<div style="display:flex;gap:10px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--line);">
      <span style="font-size:13.5px;font-weight:500;">${esc(x.name)}</span>
      <span class="num" style="margin-left:auto;font-size:12px;color:var(--text-dim);">
        ${[hm(x.secs), x.load?x.load+' TSS':null, x.meters?mi(x.meters).toFixed(1)+' mi':null]
          .filter(Boolean).join(' · ')}</span></div>`).join(''):'';
  openModal(`<h2>${new Date(iso+'T00:00:00').toLocaleDateString(undefined,
      {weekday:'long',month:'long',day:'numeric'})}</h2>
    <div class="mdate">${c.al?Math.round(c.al)+' TSS completed':'nothing recorded'}${
      c.pl?' · '+Math.round(c.pl)+' TSS planned':''}</div>
    ${list(c.a||[],'Completed','var(--green)')}
    ${list(c.p||[],'Planned','var(--amber)')}`);
}

/* -------------------------------------------------------------------- load */

function staleness(iso){
  const age=(Date.now()-new Date(iso))/3600000;
  $('dot').className='dot'+(age<6?' live':age<36?' stale':' dead');
  $('stamp').textContent='updated '+(age<1?Math.round(age*60)+' min ago'
    :age<36?Math.round(age)+' h ago':Math.round(age/24)+' days ago');
  return age;
}

async function load(){
  try{
    const r=await fetch('data.json?t='+Date.now(),{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    D=await r.json();
  }catch(err){
    $('dot').className='dot dead'; $('stamp').textContent='no data';
    $('app').innerHTML=`<div class="card"><div class="msg">Couldn't read <code>data.json</code>.<br>
      Check that the workflow has run.</div></div>`;
    return;
  }

  const age=staleness(D.generated);
  $('title').textContent=(D.athlete&&D.athlete.name)
    ? D.athlete.name.split(' ')[0]+"'s training" : 'Training';
  $('today-date').textContent=new Date().toLocaleDateString(undefined,
    {weekday:'long',month:'short',day:'numeric'});

  calAnchor=new Date(D.today.date+'T00:00:00');

  // pair two panels side by side, but only when both actually exist
  const pair=(a,b)=> (a&&b) ? `<div class="grid2">${a}${b}</div>` : (a||b||'');

  $('app').innerHTML =
      secForm() + secStats() + secCalendar()
    + pair(secWeekly(), secMonthly())
    + secRoutes()
    + pair(secPower(), secYoY())
    + secZones()
    + pair(secStreaks(), secWeather())
    + pair(secWellness(), secBests())
    + secGear()
    + secRecent();

  drawStats();
  drawCalendar();
  try{ drawMap(); }catch(e){ console.error('map failed:', e); }
  const ms=$('map-seg');
  if(ms) ms.addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    document.querySelectorAll('#map-seg button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); mapMode=b.dataset.m;
    try{ drawMap(); }catch(err){ console.error(err); }
  });
  try{ charts(); }catch(e){ console.error('charts failed:', e); }

  $('stat-seg').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    document.querySelectorAll('#stat-seg button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); period=b.dataset.p; drawStats();
  });

  $('cal-prev').onclick=()=>calStep(-1);
  $('cal-next').onclick=()=>calStep(1);
  $('cal-today').onclick=()=>{calAnchor=new Date(D.today.date+'T00:00:00');drawCalendar();};
  $('cal-seg').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    document.querySelectorAll('#cal-seg button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); calView=b.dataset.v; drawCalendar();
  });
  document.querySelectorAll('.row[data-i]').forEach(b=>
    b.addEventListener('click',()=>openActivity(+b.dataset.i)));

  $('foot').textContent = age>36 ? 'Data is stale — is the workflow still running?' : 'intervals.icu';
}

load();
document.addEventListener('visibilitychange',()=>{if(!document.hidden)load();});
</script>
